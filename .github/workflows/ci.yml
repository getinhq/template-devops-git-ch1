name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: test -f README.md && test -f notes.txt
      - name: notes.txt must be filled in
        run: |
          grep -q "TODO:" notes.txt && echo "Complete notes.txt (remove TODO lines)" && exit 1 || true
          grep -q "GitHub repo URL" notes.txt
